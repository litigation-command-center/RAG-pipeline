# infra/karpenter/provisioner-gpu.yaml
apiVersion: karpenter.sh/v1beta1
kind: Provisioner
metadata:
  name: gpu-provisioner
spec:
  # Limits: Safety cap to prevent accidental million-dollar bills
  limits:
    resources:
      cpu: 1000
      memory: 4000Gi
      nvidia.com/gpu: 100 # Max 100 GPUs allowed

  # Provider: AWS Specifics
  providerRef:
    name: default

  # Requirements: What kind of nodes can we spawn?
  requirements:
    - key: "karpenter.k8s.aws/instance-category"
      operator: In
      values: ["g", "p"] # g5 (Inference), p4d (Training/Heavy Batch)
    
    - key: "karpenter.k8s.aws/instance-generation"
      operator: Gt
      values: ["4"] # Ensure we get g5, not old g4
    
    - key: "kubernetes.io/arch"
      operator: In
      values: ["amd64"]
    
    # CAPACITY TYPE: Spot is cheaper, On-Demand is reliable.
    # For Production, we use a mix.
    - key: "karpenter.sh/capacity-type"
      operator: In
      values: ["on-demand", "spot"]

  # TTL (Time To Live): Kill the node if it's empty for 30 seconds
  ttlSecondsAfterEmpty: 30