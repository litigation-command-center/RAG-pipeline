# infra/karpenter/provisioner-cpu.yaml
apiVersion: karpenter.sh/v1beta1
kind: Provisioner
metadata:
  name: cpu-provisioner
spec:
  limits:
    resources:
      cpu: 1000
  
  providerRef:
    name: default

  requirements:
    - key: "karpenter.k8s.aws/instance-family"
      operator: In
      values: ["m6i", "c6i", "r6i"] # Intel Gen 6 (General, Compute, Memory optimized)
    
    - key: "karpenter.sh/capacity-type"
      operator: In
      values: ["spot"] # Use Spot for stateless API pods to save money
  
  # Consolidation: actively move pods to pack nodes tighter
  consolidation:
    enabled: true