# deploy/ray/ray-serve-llm.yaml
apiVersion: ray.io/v1
kind: RayService
metadata:
  name: llm-service
spec:
  serviceUnhealthySecondThreshold: 900 # Allow 15 mins for model download/load
  deploymentUnhealthySecondThreshold: 900

  rayClusterConfig:
    rayVersion: '2.9.0'
    # (References the cluster config above via operator logic)

  serveConfigV2: |
    applications:
      - name: llama3
        import_path: services.api.app.models.vllm_engine:app
        route_prefix: /llm
        runtime_env:
          pip: ["vllm==0.3.0", "torch==2.1.2"]
          env_vars:
            MODEL_ID: "meta-llama/Meta-Llama-3-70B-Instruct"
            
        deployments:
          - name: VLLMDeployment
            # Autoscaling: Scale based on how many requests are waiting
            autoscaling_config:
              min_replicas: 1
              max_replicas: 10
              target_num_ongoing_requests_per_replica: 20
            
            ray_actor_options:
              num_cpus: 4
              num_gpus: 1 # Assign 1 A10G GPU per replica
            
            # vLLM Specific Configuration for Production
            user_config:
              # Max tokens to generate
              max_model_len: 8192 
              # Batch size: Process 128 user queries concurrently per GPU
              max_num_seqs: 128
              # Quantization: Use AWQ (4-bit) to fit 70B on smaller GPUs if needed
              quantization: "awq"