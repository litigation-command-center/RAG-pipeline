# deploy/ray/autoscaling.yaml
# Config map merged into RayCluster definition via KubeRay

autoscaling:
  # Enable the Ray Autoscaler logic
  enabled: true
  
  # How often to check if we need more workers
  upscaling_speed: 1.0 # Aggressive upscaling
  idle_timeout_minutes: 5 # Kill worker if idle for 5 mins
  
  # Resource Groups (Matched with Karpenter Provisioners)
  worker_nodes:
    cpu_worker_group:
      min_workers: 1
      max_workers: 50
      resources: {"CPU": 8, "memory": 32Gi}
      
    gpu_worker_group:
      min_workers: 0
      max_workers: 20
      resources: {"CPU": 4, "memory": 32Gi, "GPU": 1}