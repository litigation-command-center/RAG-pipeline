# deploy/ray/ray-serve-embed.yaml
apiVersion: ray.io/v1
kind: RayService
metadata:
  name: embed-service
spec:
  serveConfigV2: |
    applications:
      - name: bge-m3
        import_path: services.api.app.models.embedding_engine:app
        route_prefix: /embed
        deployments:
          - name: EmbedDeployment
            autoscaling_config:
              min_replicas: 1
              max_replicas: 5
              target_num_ongoing_requests_per_replica: 50
            ray_actor_options:
              num_cpus: 2
              num_gpus: 0.5 # Share GPU (2 models per GPU) to save money