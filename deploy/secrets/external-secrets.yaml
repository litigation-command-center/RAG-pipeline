# deploy/secrets/external-secrets.yaml
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
spec:
  refreshInterval: 1h             # Check for rotation every hour
  secretStoreRef:
    name: aws-secrets-manager     # Defined in ClusterSecretStore
    kind: ClusterSecretStore
  target:
    name: app-env-secret          # Name of the K8s secret to create
    creationPolicy: Owner
  data:
  - secretKey: OPENAI_API_KEY     # Env var name in Pod
    remoteRef:
      key: prod/rag/api_keys      # Secret name in AWS
      property: openai_api_key    # JSON key in AWS Secret
  - secretKey: NEO4J_PASSWORD
    remoteRef:
      key: prod/rag/db_creds
      property: neo4j_password