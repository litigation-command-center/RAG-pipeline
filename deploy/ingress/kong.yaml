# deploy/ingress/kong.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-kong-ingress
  annotations:
    kubernetes.io/ingress.class: kong
    
    # Enable Rate Limiting Plugin
    konghq.com/plugins: global-rate-limit
    
    # Strip the path prefix when forwarding to service
    konghq.com/strip-path: "true"
spec:
  rules:
  - host: api.your-rag-platform.com
    http:
      paths:
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 80

---
# Define the Rate Limit Plugin
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: global-rate-limit
config: 
  minute: 100
  policy: local