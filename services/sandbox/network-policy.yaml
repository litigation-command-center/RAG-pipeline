# services/sandbox/network-policy.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-deny-egress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: sandbox-service
  policyTypes:
  - Egress
  # Deny ALL egress traffic by default.
  # The sandbox cannot call out to the internet or other services.
  egress: []