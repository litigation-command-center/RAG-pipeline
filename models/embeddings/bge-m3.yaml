# models/embeddings/bge-m3.yaml
model_config:
  model_id: "BAAI/bge-m3"
  
  # Batch size for embedding generation (Higher = faster ingestion)
  batch_size: 32
  
  # Normalize vectors for Cosine Similarity
  normalize_embeddings: true
  
  # Precision: FP16 is faster on T4/A10 GPUs
  dtype: "float16"
  
  # Max sequence length (BGE-M3 supports 8192, but we chunk at 512 for RAG precision)
  max_seq_length: 8192