# models/llm/llama-70b.yaml
model_config:
  # HuggingFace Model ID
  model_id: "meta-llama/Meta-Llama-3-70B-Instruct"
  
  # Quantization: AWQ is SOTA for high-throughput inference on Nvidia GPUs
  quantization: "awq"
  
  # Context Window: Llama-3 supports 8k. We cap at 8192.
  max_model_len: 8192
  
  # Batching: Critical for "1000s of users"
  max_num_seqs: 128  # Process 128 requests in parallel per replica
  
  # Hardware requirements (Mapping to AWS instances)
  gpu_memory_utilization: 0.90
  tensor_parallel_size: 4 # Requires 4 GPUs to run (e.g., 1x g5.12xlarge)
  
  # Stop tokens
  stop_token_ids: [128001, 128009] # <|eot_id|> specific to Llama-3 tokenizer