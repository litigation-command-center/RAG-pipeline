# models/llm/llama-7b.yaml
model_config:
  model_id: "meta-llama/Meta-Llama-3-8B-Instruct"
  
  # 8B fits easily on a single T4 or A10 GPU
  quantization: "awq" 
  
  max_model_len: 8192
  
  # Higher throughput possible due to small size
  max_num_seqs: 256 
  
  gpu_memory_utilization: 0.85
  tensor_parallel_size: 1
  
  stop_token_ids: [128001, 128009]